<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FintechCore — Gerenciador Financeiro Premium</title>
    
    <!-- PWA primary configs and Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#020617" />
    <link rel="icon" type="image/png" href="./icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-512.png" />
    
    <!-- iOS / Safari PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FintechCore" />
    <link rel="apple-touch-icon" href="./icon-512.png" />
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => console.log('FintechCore Service Worker registrado com sucesso:', reg.scope))
            .catch((err) => console.error('Erro ao registrar Service Worker do FintechCore:', err));
        });
      }
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen select-none">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
