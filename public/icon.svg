<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  <rect x="8" y="8" width="496" height="496" rx="120" fill="none" stroke="#1e293b" stroke-width="4" />

  <!-- Shield Shield Contour Group -->
  <g transform="translate(128, 100)">
    <!-- Outer Glow Shield -->
    <path d="M128 0 C185 0, 256 24, 256 24 C256 120, 220 220, 128 290 C36 220, 0 120, 0 24 C0 24, 71 0, 128 0 Z" 
          fill="url(#emerald-grad)" 
          filter="url(#glow)" 
          opacity="0.15" />
          
    <!-- Main Emerald Shield -->
    <path d="M128 0 C185 0, 256 24, 256 24 C256 120, 220 220, 128 290 C36 220, 0 120, 0 24 C0 24, 71 0, 128 0 Z" 
          fill="url(#emerald-grad)" 
          stroke="#10b981" 
          stroke-width="4" />

    <!-- Gilded Inner Rim -->
    <path d="M128 24 C168 24, 224 42, 224 42 C224 110, 196 190, 128 248 C60 190, 32 110, 32 42 C32 42, 88 24, 128 24 Z" 
          fill="none" 
          stroke="url(#gold-grad)" 
          stroke-width="5" 
          opacity="0.9" />

    <!-- Upward Growth Finance Line Chart inside Shield -->
    <path d="M75 160 L115 125 L145 150 L185 100" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <polygon points="185,100 165,105 178,122" fill="#ffffff" />
  </g>
</svg>
